name: Populate Cache

description: |
  An action to populate the maven cache.

inputs:
  nvd-api-key:
    description: The API key for the NVD database, used by the dependency-check scan plugin
    required: true

runs:
  using: composite

  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        cache: maven
        distribution: temurin
        java-version: 21
      id: setup-java

    - name: Download Maven Build Cache
      uses: actions/cache@v4
      with:
        path: ${{ runner.home }}/.m2/build-cache
        key: maven-build-cache

    - name: Populate Cache
      if: ${{ steps.setup-java.outputs.cache-hit != 'true' }}
      shell: sh
      run: |
        ./mvnw \
          --batch-mode \
          --color always \
          --define nvdApiKey=${{ inputs.nvd-api-key }} \
          go-offline:resolve-dependencies \
          dependency-check:update-only

    - name: Upload Maven Build Cache
      uses: actions/cache/save@v4
      if: ${{ always() }}
      with:
        path: ${{ runner.home }}/.m2/build-cache
        key: maven-build-cache

    - name: Cancel Build
      if: ${{ failure() }}
      uses: andymckay/cancel-action@0.5